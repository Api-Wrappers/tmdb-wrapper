name: Release

on:
  push:
    branches:
      - main
      - "release/*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run validation and package checks without publishing"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Create release PR or publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate package
        run: bun run verify

      - name: Verify npm package contents
        run: npm pack --dry-run --json

      - name: Stop manual publishing outside main or release branches
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run != true && github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/heads/release/')
        run: |
          echo "Publishing is only allowed from main or release/* branches." >&2
          exit 1

      - name: Create release PR or publish to npm
        if: github.ref == 'refs/heads/main' && !(github.event_name == 'workflow_dispatch' && inputs.dry_run)
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release
          title: Version Packages
          commit: Version Packages
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Publish to npm (release branch)
        if: startsWith(github.ref, 'refs/heads/release/') && !(github.event_name == 'workflow_dispatch' && inputs.dry_run)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
